<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#144982" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="De Sousa Consulting" />
    <title>De Sousa Consulting — Canvas</title>

    <link rel="icon" type="image/png" href="/assets/favicon-desousa.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/canvas/styles.css" />
    <script defer src="/config.js"></script>
    <script defer src="/pwa.js"></script>
  </head>

  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <div class="brand brand--demo">
            <div class="fbos-logo-slot">
              <img src="/assets/logo-desousa.png" alt="De Sousa Consulting" class="brand-logo" />
            </div>
            <div>
              <h1>De Sousa Consulting</h1>
              <p>Canvas operativo</p>
            </div>
          </div>
        </header>

        <nav class="sd-nav" aria-label="Navegación del módulo">
          <a
            class="sd-nav__item"
            href="/index.html"
            target="_blank"
            rel="noopener noreferrer"
          >
            Landing
          </a>

          <a class="sd-nav__item is-active" href="/canvas/index.html">
            Canvas
          </a>

          <a class="sd-nav__item" href="/history/index.html">
            Historial
          </a>
        </nav>

        <div id="actionsList" class="actions-list" data-demo="de-sousa-consulting"></div>
      </section>

      <footer class="footer">
        <small>FBOS De Sousa Consulting Canvas v0.1</small>
      </footer>
    </main>

    <!-- Modal -->
    <div
      id="jobModal"
      class="label-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
    >
      <div class="label-card" role="document">
        <div class="label-head">
          <strong>Solicitud</strong>
          <button
            type="button"
            class="label-close"
            id="jobCloseBtn"
            aria-label="Cerrar"
          >
            ✕
          </button>
        </div>

        <div class="label-body">
          <div class="label-top">
            <div>
              <div class="label-id" id="jobModalId">FBOS-00000</div>
              <div class="label-meta" id="jobModalState">—</div>
            </div>
          </div>

          <div class="label-grid">
            <div><strong>Categoría:</strong> <span id="jobModalCategory">—</span></div>
            <div><strong>Tipo de solicitud:</strong> <span id="jobModalUrgency">—</span></div>
            <div><strong>Solicitante:</strong> <span id="jobModalDamage">—</span></div>
            <div><strong>País:</strong> <span id="jobModalPrice">—</span></div>

            <div class="label-desc">
              <strong>Descripción:</strong> <span id="jobModalDesc">—</span>
            </div>

            <div id="jobModalEvidenceWrap" class="label-evidence" style="display:none;">
              <strong>Evidencia:</strong>
              <div class="label-evidence__content">
                <a
                  id="jobModalEvidenceLink"
                  href="#"
                  target="_blank"
                  rel="noopener noreferrer"
                  style="display:none;"
                >
                  Abrir archivo
                </a>

                <div id="jobModalEvidenceImageWrap" style="display:none; margin-top:10px;">
                  <img
                    id="jobModalEvidenceImage"
                    alt="Evidencia visual"
                    style="max-width:100%; border-radius:12px; border:1px solid #E5E7EB;"
                  />
                </div>

                <div
                  id="jobModalEvidenceMeta"
                  class="label-meta"
                  style="margin-top:8px;"
                ></div>
              </div>
            </div>

            <div><strong>Creado:</strong> <span id="jobModalCreated">—</span></div>
            <div><strong>Actualizado:</strong> <span id="jobModalUpdated">—</span></div>
          </div>

          <div class="label-comments">
            <div class="label-comments__title">Comentarios</div>
            <div id="jobCommentsList" class="comments-list"></div>

            <div class="comments-composer">
              <textarea
                id="jobCommentText"
                class="comments-textarea"
                rows="3"
                placeholder="Escribe un comentario..."
              ></textarea>

              <div class="comments-actions">
                <input
                  id="jobCommentBy"
                  class="comments-by"
                  type="text"
                  placeholder="Tu nombre (opcional)"
                />
                <button
                  id="jobCommentSendBtn"
                  class="btn-secondary"
                  type="button"
                >
                  Comentar
                </button>
              </div>

              <div
                id="jobCommentStatus"
                class="inline-msg"
                style="display:none;"
              ></div>
            </div>
          </div>
        </div>

        <div class="label-actions">
          <button type="button" class="btn-secondary" id="jobOpenApiBtn">
            Abrir API
          </button>
        </div>
      </div>
    </div>

    <script>
      window.FBOS_CANVAS_CONFIG = {
        useMultiDemo: true,
        demos: {
          desousa: {
            demo: "de-sousa-consulting",
            scanPath: "/canvas/index.html",
            states: ["Nuevas", "Validadas", "Asignadas", "En ejecución", "En revisión", "Cerradas"],
            actionLabel: {
              Nuevas: "Revisar",
              Validadas: "Calificar",
              Asignadas: "Gestionar",
              "En ejecución": "Seguimiento",
              "En revisión": "Cerrar",
              Cerradas: "Cerrada",
            },
          },
        },
      };
    </script>

    <script src="/canvas/canvas.js"></script>
  </body>
</html>
