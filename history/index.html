<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>De Sousa Consulting — Historial</title>

    <link rel="icon" type="image/png" href="/assets/favicon-desousa.png" />

    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/canvas/styles.css" />
    <script defer src="/config.js"></script>

    <style>
      .history-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .history-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .history-search {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 10px 0 14px;
      }

      .hint {
        font-size: 12px;
        color: #64748b;
        line-height: 1.35;
      }

      #countLabel {
        font-weight: 900 !important;
        font-size: 18px !important;
        letter-spacing: -0.01em;
      }

      #searchInput {
        width: 100%;
        height: 44px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
        font-weight: 700;
        color: var(--text);
      }

      .table-wrap {
        width: 100%;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      thead th {
        text-align: left;
        font-size: 12px;
        color: #475569;
        background: #f8fafc;
        padding: 12px;
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 1;
        text-transform: uppercase;
      }

      tbody td {
        padding: 12px;
        border-bottom: 1px solid #eef2f7;
        font-size: 14px;
      }

      .empty-box {
        padding: 14px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.03);
        color: #64748b;
        font-weight: 800;
        font-size: 13px;
        border: 1px solid rgba(148, 163, 184, 0.35);
      }
    </style>
  </head>

  <body class="fbos-board">
    <main class="wrap">
      <section class="card">
        <header class="header">
          <div class="brand brand--demo">
            <div class="fbos-logo-slot">
              <img src="/assets/logo-desousa.png" alt="De Sousa Consulting" class="brand-logo" />
            </div>
            <div>
              <h1>De Sousa Consulting</h1>
              <p>Historial operativo</p>
            </div>
          </div>
        </header>

        <!-- ✅ NAV CORREGIDO -->
        <nav class="sd-nav">
          <a
            class="sd-nav__item"
            href="/index.html"
            target="_blank"
            rel="noopener"
          >
            Landing
          </a>

          <a class="sd-nav__item" href="/canvas/index.html">
            Canvas
          </a>

          <a class="sd-nav__item is-active" href="/history/index.html">
            Historial
          </a>
        </nav>

        <div class="history-top">
          <div>
            <div id="countLabel">Cerradas (—)</div>
            <div class="hint">
              Busca por ID, categoría, país, solicitante o texto.
            </div>
          </div>

          <div class="history-actions">
            <button class="btn btn-small" id="refreshBtn" type="button">
              Actualizar
            </button>
          </div>
        </div>

        <div class="history-search">
          <input
            id="searchInput"
            type="text"
            placeholder="Buscar… (ej. FBOS-00016, Finanzas, Costa Rica, Colin)"
            autocomplete="off"
          />
          <div id="status" class="status"></div>
        </div>

        <div id="content"></div>

        <footer class="footer">
          <small>FBOS De Sousa Consulting History v0.1</small>
        </footer>
      </section>
    </main>

    <!-- MODAL -->
    <div class="label-modal" id="historyModal" aria-hidden="true">
      <div class="label-card">
        <div class="label-head">
          <strong>Solicitud</strong>
          <button class="label-close" id="historyCloseBtn">✕</button>
        </div>

        <div class="label-body" id="historyModalBody"></div>
      </div>
    </div>

    <script src="/history/history.js"></script>
  </body>
</html>
